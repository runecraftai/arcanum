<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d070"/>
      <stop offset="40%" stop-color="#d4a843"/>
      <stop offset="75%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark plate background -->
  <rect x="0" y="0" width="560" height="120" rx="6" ry="6" fill="url(#plateGrad)"/>
  <!-- Gold border -->
  <rect x="0" y="0" width="560" height="120" rx="6" ry="6" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <!-- Inner bevel -->
  <rect x="5" y="5" width="550" height="110" rx="4" ry="4" fill="none" stroke="#2a2010" stroke-width="1"/>

  <!-- Diamond decorations left/right -->
  <polygon points="0,60 14,46 28,60 14,74" fill="url(#goldGrad)"/>
  <polygon points="532,60 546,46 560,60 546,74" fill="url(#goldGrad)"/>

  <!-- RUNECRAFT text — bold serif/slab matching image style -->
  <text x="280" y="84"
    text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="68"
    font-weight="bold"
    letter-spacing="8"
    fill="url(#goldGrad)"
    filter="url(#goldGlow)">RUNECRAFT</text>
</svg>
