<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Arcanum — the vault for the Runecraft OpenCode toolkit</title>
  <desc id="desc">Five packages shelved as artifacts: Spells, Summon, Runes, Guild, and Spawn, each an OpenCode plugin or CLI.</desc>

  <rect width="1200" height="430" rx="20" fill="#0b0d10"/>

  <g stroke="#ffffff" stroke-opacity="0.045">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="340" x2="1200" y2="340"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="60" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" letter-spacing="3" fill="#c9a24a">TYPESCRIPT &#183; BUN WORKSPACES &#183; OPENCODE PLUGINS</text>
    <text x="60" y="130" font-size="64" font-weight="700" fill="#ede7d8">Arcanum</text>
    <text x="60" y="164" font-size="22" fill="#8b8f97">The vault where Runecraft keeps five artifacts for OpenCode agents.</text>
  </g>

  <line x1="60" y1="200" x2="1140" y2="200" stroke="#262b31" stroke-width="1.5"/>

  <!-- Spells -->
  <g transform="translate(60,216)">
    <line x1="98" y1="-16" x2="98" y2="0" stroke="#262b31" stroke-width="1.5"/>
    <rect width="196" height="170" rx="12" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <g transform="translate(16,16)" stroke="#c9a24a" stroke-width="2" fill="none" stroke-linecap="round">
      <rect x="3" y="9" width="18" height="6" rx="3"/>
      <circle cx="3" cy="12" r="3"/>
      <circle cx="21" cy="12" r="3"/>
    </g>
    <text x="16" y="62" font-size="22" font-weight="700" fill="#ede7d8">Spells</text>
    <text x="16" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5" fill="#8b8f97">@runecraft/spells</text>
    <text x="16" y="106" font-size="13.5" fill="#8b8f97">
      <tspan x="16" dy="0">Skill scrolls agents</tspan>
      <tspan x="16" dy="16">study to learn</tspan>
      <tspan x="16" dy="16">specialized rites.</tspan>
    </text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">PUBLISHED</text>
  </g>

  <!-- Summon -->
  <g transform="translate(280,216)">
    <line x1="98" y1="-16" x2="98" y2="0" stroke="#262b31" stroke-width="1.5"/>
    <rect width="196" height="170" rx="12" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <g transform="translate(16,16)" stroke="#c9a24a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="18" rx="3"/>
      <path d="M6 9l4 3-4 3"/>
      <line x1="12" y1="15" x2="18" y2="15"/>
    </g>
    <text x="16" y="62" font-size="22" font-weight="700" fill="#ede7d8">Summon</text>
    <text x="16" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5" fill="#8b8f97">@runecraft/summon</text>
    <text x="16" y="106" font-size="13.5" fill="#8b8f97">
      <tspan x="16" dy="0">The summoning</tspan>
      <tspan x="16" dy="16">circle — installs</tspan>
      <tspan x="16" dy="16">spells into a repo.</tspan>
    </text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">PUBLISHED</text>
  </g>

  <!-- Runes -->
  <g transform="translate(500,216)">
    <line x1="98" y1="-16" x2="98" y2="0" stroke="#262b31" stroke-width="1.5"/>
    <rect width="196" height="170" rx="12" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <g transform="translate(16,16)" stroke="#c9a24a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="3" x2="12" y2="21"/>
      <line x1="12" y1="3" x2="4" y2="9"/>
      <line x1="12" y1="3" x2="20" y2="9"/>
    </g>
    <text x="16" y="62" font-size="22" font-weight="700" fill="#ede7d8">Runes</text>
    <text x="16" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5" fill="#8b8f97">@runecraft/runes</text>
    <text x="16" y="106" font-size="13.5" fill="#8b8f97">
      <tspan x="16" dy="0">Carved sigils —</tspan>
      <tspan x="16" dy="16">durable, per-repo</tspan>
      <tspan x="16" dy="16">agent memory.</tspan>
    </text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">PUBLISHED</text>
  </g>

  <!-- Guild -->
  <g transform="translate(720,216)">
    <line x1="98" y1="-16" x2="98" y2="0" stroke="#262b31" stroke-width="1.5"/>
    <rect width="196" height="170" rx="12" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <g transform="translate(16,16)" stroke="#c9a24a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 L20 6 V12 C20 18 16 21 12 22 C8 21 4 18 4 12 V6 Z"/>
    </g>
    <text x="16" y="62" font-size="22" font-weight="700" fill="#ede7d8">Guild</text>
    <text x="16" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5" fill="#8b8f97">@runecraft/guild</text>
    <text x="16" y="106" font-size="13.5" fill="#8b8f97">
      <tspan x="16" dy="0">Party charters —</tspan>
      <tspan x="16" dy="16">8 agents, workflows,</tspan>
      <tspan x="16" dy="16">orchestration.</tspan>
    </text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">PUBLISHED</text>
  </g>

  <!-- Spawn -->
  <g transform="translate(940,216)">
    <line x1="98" y1="-16" x2="98" y2="0" stroke="#262b31" stroke-width="1.5"/>
    <rect width="196" height="170" rx="12" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <g transform="translate(16,16)" stroke="#c9a24a" stroke-width="2" fill="none" stroke-linejoin="round">
      <rect x="2" y="2" width="9" height="9" rx="1.5"/>
      <rect x="13" y="2" width="9" height="20" rx="1.5"/>
      <rect x="2" y="13" width="9" height="9" rx="1.5"/>
    </g>
    <text x="16" y="62" font-size="22" font-weight="700" fill="#ede7d8">Spawn</text>
    <text x="16" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5" fill="#8b8f97">@runecraft/spawn</text>
    <text x="16" y="106" font-size="13.5" fill="#8b8f97">
      <tspan x="16" dy="0">Summoned panes —</tspan>
      <tspan x="16" dy="16">live tmux view of</tspan>
      <tspan x="16" dy="16">every subagent.</tspan>
    </text>
    <text x="16" y="154" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">PUBLISHED</text>
  </g>
</svg>
