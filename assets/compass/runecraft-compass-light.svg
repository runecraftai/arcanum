<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="50%" stop-color="#b8901a"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <linearGradient id="darkArm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>
  </defs>

  <!-- Light background -->
  <rect width="300" height="300" rx="55" ry="55" fill="#f8f8f6"/>

  <!-- Outer coin rim gold -->
  <circle cx="150" cy="150" r="128" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="4.5"/>
  <circle cx="150" cy="150" r="122" fill="none" stroke="#e0d0a0" stroke-width="1.5"/>
  <circle cx="150" cy="150" r="116" fill="none" stroke="#d4b860" stroke-width="0.8" stroke-dasharray="3 9"/>

  <!-- 8 Vegvisir arms — dark grey on white -->
  <!-- N -->
  <line x1="150" y1="150" x2="150" y2="47" stroke="url(#darkArm)" stroke-width="3.5"/>
  <line x1="142" y1="70" x2="150" y2="47" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="158" y1="70" x2="150" y2="47" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="150" y1="84" x2="140" y2="74" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="150" y1="84" x2="160" y2="74" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="145" y1="95" x2="137" y2="86" stroke="#3a3a3a" stroke-width="1.8"/>
  <!-- Gold accent on N tip -->
  <line x1="148" y1="52" x2="152" y2="47" stroke="#d4a843" stroke-width="2"/>

  <!-- NE -->
  <line x1="150" y1="150" x2="223" y2="77" stroke="url(#darkArm)" stroke-width="3"/>
  <line x1="192" y1="100" x2="198" y2="92" stroke="#3a3a3a" stroke-width="2.5"/>
  <line x1="186" y1="106" x2="192" y2="98" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="200" y1="100" x2="207" y2="88" stroke="#d4a843" stroke-width="2"/>
  <line x1="196" y1="110" x2="202" y2="96" stroke="#3a3a3a" stroke-width="2"/>

  <!-- E -->
  <line x1="150" y1="150" x2="253" y2="150" stroke="url(#darkArm)" stroke-width="3.5"/>
  <line x1="230" y1="142" x2="253" y2="150" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="230" y1="158" x2="253" y2="150" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="218" y1="145" x2="210" y2="137" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="218" y1="155" x2="210" y2="163" stroke="#3a3a3a" stroke-width="2"/>

  <!-- SE -->
  <line x1="150" y1="150" x2="223" y2="223" stroke="url(#darkArm)" stroke-width="3"/>
  <line x1="194" y1="198" x2="200" y2="192" stroke="#3a3a3a" stroke-width="2.5"/>
  <line x1="189" y1="193" x2="195" y2="187" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="203" y1="193" x2="210" y2="205" stroke="#d4a843" stroke-width="2"/>

  <!-- S -->
  <line x1="150" y1="150" x2="150" y2="253" stroke="url(#darkArm)" stroke-width="3.5"/>
  <line x1="142" y1="230" x2="150" y2="253" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="158" y1="230" x2="150" y2="253" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="150" y1="216" x2="140" y2="226" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="150" y1="216" x2="160" y2="226" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="145" y1="205" x2="137" y2="214" stroke="#3a3a3a" stroke-width="1.8"/>

  <!-- SW -->
  <line x1="150" y1="150" x2="77" y2="223" stroke="url(#darkArm)" stroke-width="3"/>
  <line x1="106" y1="198" x2="100" y2="192" stroke="#3a3a3a" stroke-width="2.5"/>
  <line x1="111" y1="193" x2="105" y2="187" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="97" y1="193" x2="90" y2="205" stroke="#d4a843" stroke-width="2"/>

  <!-- W -->
  <line x1="150" y1="150" x2="47" y2="150" stroke="url(#darkArm)" stroke-width="3.5"/>
  <line x1="70" y1="142" x2="47" y2="150" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="70" y1="158" x2="47" y2="150" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="82" y1="145" x2="90" y2="137" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="82" y1="155" x2="90" y2="163" stroke="#3a3a3a" stroke-width="2"/>

  <!-- NW -->
  <line x1="150" y1="150" x2="77" y2="77" stroke="url(#darkArm)" stroke-width="3"/>
  <line x1="108" y1="100" x2="102" y2="92" stroke="#3a3a3a" stroke-width="2.5"/>
  <line x1="114" y1="106" x2="108" y2="98" stroke="#3a3a3a" stroke-width="2"/>
  <line x1="100" y1="100" x2="93" y2="88" stroke="#d4a843" stroke-width="2"/>
  <line x1="104" y1="110" x2="98" y2="96" stroke="#3a3a3a" stroke-width="2"/>

  <!-- Center -->
  <circle cx="150" cy="150" r="18" fill="#f0f0f0" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="10" fill="none" stroke="#d4a843" stroke-width="1.5"/>

  <!-- Cardinal rune labels -->
  <text x="150" y="26" text-anchor="middle" font-family="serif" font-size="12" fill="#b8901a" transform="rotate(0,150,150)">ᚾ</text>
  <text x="150" y="26" text-anchor="middle" font-family="serif" font-size="12" fill="#9a7830" transform="rotate(90,150,150)">ᛖ</text>
  <text x="150" y="26" text-anchor="middle" font-family="serif" font-size="12" fill="#9a7830" transform="rotate(180,150,150)">ᛊ</text>
  <text x="150" y="26" text-anchor="middle" font-family="serif" font-size="12" fill="#9a7830" transform="rotate(270,150,150)">ᚹ</text>
</svg>
