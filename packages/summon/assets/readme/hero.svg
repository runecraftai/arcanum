<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Summon — interactive CLI for installing Arcanum agent skills</title>
  <desc id="desc">Terminal transcript of the summon install wizard: pick a category, detect agents, choose install method and scope, then install.</desc>

  <rect width="1200" height="400" rx="20" fill="#0b0d10"/>
  <g stroke="#ffffff" stroke-opacity="0.045">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="340" x2="1200" y2="340"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="60" y="58" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" letter-spacing="2.5" fill="#c9a24a">CLI &#183; SKILL INSTALLER</text>
    <text x="60" y="126" font-size="60" font-weight="700" fill="#ede7d8">Summon</text>
    <text x="60" y="164" font-size="20" fill="#8b8f97">
      <tspan x="60" dy="0">Detects your agent, picks the</tspan>
      <tspan x="60" dy="28">right install path, and writes</tspan>
      <tspan x="60" dy="28">skills declaratively.</tspan>
    </text>
    <text x="60" y="368" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b8f97">citty &#183; @clack/prompts &#183; Node 18+</text>
  </g>

  <!-- Terminal -->
  <g transform="translate(480,40)">
    <rect width="680" height="340" rx="14" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <rect width="680" height="34" rx="14" fill="#181c21"/>
    <rect y="20" width="680" height="14" fill="#181c21"/>
    <circle cx="24" cy="17" r="5" fill="#3a3f46"/>
    <circle cx="42" cy="17" r="5" fill="#3a3f46"/>
    <circle cx="60" cy="17" r="5" fill="#3a3f46"/>
    <text x="340" y="21" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">summon install</text>

    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15.5">
      <text x="24" y="66" fill="#ede7d8">$ npx @runecraft/summon install</text>

      <text x="24" y="100" fill="#c9a24a">&#9670;  Pick a category</text>
      <text x="24" y="124" fill="#8b8f97">&#9474;  <tspan fill="#ede7d8">&#9679; Skills</tspan>   &#9675; Commands   &#9675; Setup</text>

      <text x="24" y="154" fill="#c9a24a">&#9670;  Detected agents</text>
      <text x="24" y="178" fill="#8b8f97">&#9474;  <tspan fill="#ede7d8">&#10003; OpenCode   &#10003; Cursor</tspan>   &#9675; Claude Code</text>

      <text x="24" y="208" fill="#c9a24a">&#9670;  Method</text>
      <text x="24" y="232" fill="#8b8f97">&#9474;  <tspan fill="#ede7d8">&#9679; Copy (recommended)</tspan>   &#9675; Symlink</text>

      <text x="24" y="262" fill="#c9a24a">&#9670;  Scope</text>
      <text x="24" y="286" fill="#8b8f97">&#9474;  <tspan fill="#ede7d8">&#9679; Local</tspan>   &#9675; Global</text>

      <text x="24" y="318" fill="#c9a24a">&#10003;  Installed 17 skills &#8594; .agents/skills/</text>
    </g>
  </g>
</svg>
