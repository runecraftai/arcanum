<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Guild — multi-agent orchestration plugin for OpenCode</title>
  <desc id="desc">Roster of the 8 built-in agents: Bard, Fighter, Wizard, Rogue, Warlock, Cleric, Ranger, and Paladin, with their mode.</desc>

  <rect width="1200" height="400" rx="20" fill="#0b0d10"/>
  <g stroke="#ffffff" stroke-opacity="0.045">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="340" x2="1200" y2="340"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="60" y="58" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" letter-spacing="2.5" fill="#c9a24a">OPENCODE PLUGIN &#183; ORCHESTRATION</text>
    <text x="60" y="126" font-size="60" font-weight="700" fill="#ede7d8">Guild</text>
    <text x="60" y="164" font-size="20" fill="#8b8f97">
      <tspan x="60" dy="0">8 RPG-themed agents plan,</tspan>
      <tspan x="60" dy="28">execute, and review — routed</tspan>
      <tspan x="60" dy="28">through a hooks pipeline.</tspan>
    </text>
    <text x="60" y="368" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b8f97">Zod v4 config &#183; workflow engine &#183; analytics</text>
  </g>

  <text x="480" y="34" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" letter-spacing="2" fill="#c9a24a">PARTY ROSTER &#8212; 8 AGENTS</text>

  <!-- Row 1 -->
  <g transform="translate(480,54)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Bard</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Guildmaster</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">PRIMARY</text>
  </g>
  <g transform="translate(653,54)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Fighter</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Execution Lead</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">ALL</text>
  </g>
  <g transform="translate(826,54)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Wizard</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Planner</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">ALL</text>
  </g>
  <g transform="translate(999,54)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Rogue</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Scout</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#8b8f97">SUBAGENT</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(480,218)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Warlock</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Researcher</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#8b8f97">SUBAGENT</text>
  </g>
  <g transform="translate(653,218)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Cleric</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Reviewer</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#8b8f97">SUBAGENT</text>
  </g>
  <g transform="translate(826,218)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Ranger</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Specialist</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#c9a24a">ALL</text>
  </g>
  <g transform="translate(999,218)">
    <rect width="159" height="150" rx="10" fill="#14171b" stroke="#262b31" stroke-width="1.5"/>
    <text x="12" y="34" font-size="19" font-weight="700" fill="#ede7d8">Paladin</text>
    <text x="12" y="54" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b8f97">Security</text>
    <text x="12" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="1" fill="#8b8f97">SUBAGENT</text>
  </g>
</svg>
