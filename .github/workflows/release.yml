name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
      with:
        node-version: 20

    - name: Setup Bun
      uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2.0.2
      with:
        bun-version: "1.3.5"

    - name: Install dependencies
      run: bun install --frozen-lockfile
      env:
        HUSKY: "0"

    - name: Build
      run: bun run build

    - name: Generate changesets from conventional commits
      run: bun run .changeset/generate-from-commits.ts

    - name: Commit generated changesets
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .changeset/
        # Only commit and push if there are staged changes (changesets were generated)
        # The GITHUB_TOKEN is scoped and main branch protection enforces PR reviews
        git diff --staged --quiet || (git commit -m "chore: auto-generate changesets [skip ci]" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release Pull Request or Publish
      uses: changesets/action@2eb40f21fc0fc331693bac5da931f72e4faf1eaf  # v1.4.7
      with:
        version: bun changeset:version
        publish: bun run publish:packages
        title: "chore: version packages"
        commit: "chore: version packages"
        createGithubReleases: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
